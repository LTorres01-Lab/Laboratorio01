<!doctype html>
<html lang="es-CO">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/CSS/estilo2.css" />
    <title>Prueba</title>
  </head>
  <body>
    <form action="Resultados.html" method="get">
      <div>
        <!--INGRESO DE DATOS DE LA PERSONA-->
        <h1>PRUEBA</h1>
        <h4>Ingrese sus datos</h4>
        <input class="DatosPersonas"
          type="text"
          name="Nombre"
          id="Nombre"
          placeholder="Escribe tu nombre"
          required
        />
        <input class="DatosPersonas"
          type="text"
          name="Apellido"
          id="Apellido"
          placeholder="Apellido"
          required min="0" max="100"
        />
        <input class="DatosPersonas"
          type="number"
          name="Edad"
          id="Edad"
          placeholder="Escribe tu Edad"
          required min="1" max="100"
        />
        <textarea class="DatosPersonas"
          name="Comentario"
          id="Comentario"
          placeholder="Ingresa algun comentario si deseas"
        ></textarea>
      </div>
      <div class="Botones-Tamaño">
        <div class="Botones">
          <!--BOTONES-->
          <button type="reset">Limpiar</button>
          <button type="submit">Enviar</button>
          <button type="button">Extra</button>
        </div>
      </div>
      <div>
        <br />
        <!--AUDIO/IMAGENES/VIDEO-->
        <div class="TamañoGIF">
          <img
            class="GIF"
            src="https://i0.wp.com/codigoespagueti.com/wp-content/uploads/2014/06/GIF.gif?fit=640%2C360&ssl=1"
            alt="Mi_Gif"
            frameborder="0"
            width="500"
            height="400"
          />
        </div>
      </div>
      <div> <!--IMAGEN EN TEXTO-->
        <h1 class="TexoIMAGEN">TEXTO DE PRUEBA</h1>
      </div>
    </form>
  </body>
</html>
